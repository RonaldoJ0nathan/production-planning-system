services:

  db:
    image: gvenzl/oracle-free:slim
    container_name: oracle-db
    restart: always
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 5s
    volumes:
      - oracle-data:/opt/oracle/oradata
    env_file:
      - .env
    environment:
      - ORACLE_RANDOM_PASSWORD=${ORACLE_RANDOM_PASSWORD?Variable not set}
      - APP_USER=${APP_USER?Variable not set}
      - APP_USER_PASSWORD=${APP_USER_PASSWORD?Variable not set}
      - ORACLE_DATABASE=${ORACLE_DATABASE?Variable not set}
  
  backend:
    container_name: backend-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
        restart: true
    env_file:
      - .env
    ports:
      - "8081:8081"
    environment:
      - QUARKUS_HTTP_PORT=8081
    volumes:
      # Mount source code for hot reload (dev mode only)
      - ./backend/src:/app/src
      - ./backend/pom.xml:/app/pom.xml
      # Cache Maven dependencies between restarts
      - maven-cache:/root/.m2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/q/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    
volumes:
  oracle-data:
  maven-cache:
    