# ===========================
# Oracle DataSource
# ===========================
quarkus.datasource.db-kind=oracle
quarkus.datasource.username=${APP_USER:oracle}
quarkus.datasource.password=${APP_USER_PASSWORD:changethis}
quarkus.datasource.jdbc.url=jdbc:oracle:thin:@db:1521/${ORACLE_DATABASE:app}

# ===========================
# Hibernate ORM
# ===========================
quarkus.hibernate-orm.schema-management.strategy=update

# ===========================
# HTTP
# ===========================
quarkus.http.port=8081

# ===========================
# CORS
# ===========================
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${BACKEND_CORS_ORIGINS:http://localhost:5173}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Accept

# ===========================
# OpenAPI / Swagger UI
# ===========================
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=Production Planning API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API for managing products, raw materials and production suggestions
